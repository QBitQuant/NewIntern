<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Friendly AI Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  .container {
    text-align: center;
    position: relative;
  }
  .avatar {
    width: 320px;
    height: 320px;
    border-radius: 50%;
    background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    box-shadow:
      0 20px 60px rgba(102, 126, 234, 0.4),
      0 0 100px rgba(118, 75, 162, 0.2),
      inset 0 -5px 15px rgba(0,0,0,0.1);
    animation: float 3s ease-in-out infinite;
    position: relative;
  }
  .avatar::before {
    content: '';
    position: absolute;
    width: 340px;
    height: 340px;
    border-radius: 50%;
    border: 2px solid rgba(102, 126, 234, 0.3);
    animation: pulse-ring 3s ease-in-out infinite;
  }
  .face {
    position: relative;
    width: 200px;
    height: 200px;
  }
  /* Eyes */
  .eye {
    width: 48px;
    height: 52px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 50px;
    overflow: hidden;
    box-shadow: inset 0 3px 8px rgba(0,0,0,0.15);
  }
  .eye.left { left: 30px; }
  .eye.right { right: 30px; }
  .pupil {
    width: 24px;
    height: 26px;
    background: #1a1a2e;
    border-radius: 50%;
    position: absolute;
    top: 16px;
    left: 12px;
    animation: look-around 4s ease-in-out infinite;
  }
  .pupil::after {
    content: '';
    width: 8px;
    height: 8px;
    background: white;
    border-radius: 50%;
    position: absolute;
    top: 4px;
    right: 3px;
  }
  /* Mouth */
  .mouth {
    width: 50px;
    height: 26px;
    border-bottom: 5px solid white;
    border-radius: 0 0 50px 50px;
    position: absolute;
    bottom: 42px;
    left: 50%;
    transform: translateX(-50%);
    animation: smile 3s ease-in-out infinite;
  }
  /* Cheeks */
  .cheek {
    width: 30px;
    height: 18px;
    background: rgba(255, 150, 180, 0.5);
    border-radius: 50%;
    position: absolute;
    top: 95px;
    animation: blush 3s ease-in-out infinite;
  }
  .cheek.left { left: 10px; }
  .cheek.right { right: 10px; }
  /* Antenna */
  .antenna {
    position: absolute;
    top: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 30px;
    background: linear-gradient(to top, #764ba2, #a78bfa);
    border-radius: 2px;
  }
  .antenna::after {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 16px;
    background: #a78bfa;
    border-radius: 50%;
    box-shadow: 0 0 15px rgba(167, 139, 250, 0.8);
    animation: glow 2s ease-in-out infinite alternate;
  }
  /* Floating particles */
  .particles {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: rgba(167, 139, 250, 0.6);
    border-radius: 50%;
    animation: drift linear infinite;
  }
  .particle:nth-child(1) { left: 10%; top: 20%; animation-duration: 8s; animation-delay: 0s; }
  .particle:nth-child(2) { left: 25%; top: 60%; animation-duration: 10s; animation-delay: -2s; }
  .particle:nth-child(3) { left: 50%; top: 30%; animation-duration: 7s; animation-delay: -4s; }
  .particle:nth-child(4) { left: 70%; top: 70%; animation-duration: 9s; animation-delay: -1s; }
  .particle:nth-child(5) { left: 85%; top: 40%; animation-duration: 11s; animation-delay: -3s; }
  .particle:nth-child(6) { left: 40%; top: 80%; animation-duration: 8s; animation-delay: -5s; }
  .particle:nth-child(7) { left: 60%; top: 15%; animation-duration: 12s; animation-delay: -6s; }
  .particle:nth-child(8) { left: 90%; top: 55%; animation-duration: 9s; animation-delay: -2s; }
  .title {
    color: white;
    font-size: 28px;
    font-weight: 700;
    margin-top: 40px;
    letter-spacing: 1px;
    text-shadow: 0 2px 10px rgba(102, 126, 234, 0.5);
  }
  .subtitle {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    margin-top: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.08); opacity: 0.1; }
  }
  @keyframes look-around {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(5px, -2px); }
    50% { transform: translate(-3px, 2px); }
    75% { transform: translate(4px, 1px); }
  }
  @keyframes smile {
    0%, 100% { height: 26px; }
    50% { height: 30px; }
  }
  @keyframes blush {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.7; }
  }
  @keyframes glow {
    0% { box-shadow: 0 0 10px rgba(167, 139, 250, 0.6); transform: translateX(-50%) scale(1); }
    100% { box-shadow: 0 0 25px rgba(167, 139, 250, 1); transform: translateX(-50%) scale(1.2); }
  }
  @keyframes drift {
    0% { transform: translateY(0) scale(1); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100vh) scale(0.5); opacity: 0; }
  }
</style>
</head>
<body>
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>
  <div class="container">
    <div class="avatar">
      <div class="antenna"></div>
      <div class="face">
        <div class="eye left"><div class="pupil"></div></div>
        <div class="eye right"><div class="pupil"></div></div>
        <div class="mouth"></div>
        <div class="cheek left"></div>
        <div class="cheek right"></div>
      </div>
    </div>
    <div class="title">Your AI Assistant</div>
    <div class="subtitle">Here to help ✨</div>
  </div>
</body>
</html>
